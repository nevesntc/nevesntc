name: Update Year

on:
  schedule:
    - cron: '0 0 1 1 *' # todo 1º de janeiro
  workflow_dispatch:

jobs:
  update-year:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Update year in README
        run: |
          YEAR=$(date +'%Y')
          sed -i "s/© [0-9]\{4\}/© $YEAR/g" README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "🔄 Atualiza ano automaticamente"
          git push
